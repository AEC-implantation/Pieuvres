
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAUSSE PIEUVRES — Configurateur C15</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;700&display=swap');
  :root{--bg:#ddeeff;--panel:#f0f7ff;--border:#aaccee;--accent:#f0a500;--accent2:#00c9a7;--text:#1a2a3a;--muted:#5577aa;--input-bg:#ffffff;--input-border:#99bbdd;--hdr:#b8d8f0}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;align-items:flex-end;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal-box{background:var(--panel);border-radius:16px 16px 0 0;width:100%;max-height:80vh;overflow-y:auto;padding:20px 16px 30px}
  .modal-title{font-family:'IBM Plex Mono',monospace;font-size:.9rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px}
  .project-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;margin-bottom:8px;background:var(--bg);border:1px solid var(--border);border-radius:6px}
  .project-info{flex:1}
  .project-name{font-size:.85rem;font-weight:600;color:var(--text)}
  .project-date{font-size:.7rem;color:var(--muted);margin-top:2px}
  .project-btns{display:flex;gap:6px}
  .btn-load{background:var(--accent2);border:none;border-radius:4px;color:#0f1117;font-family:'IBM Plex Mono',monospace;font-size:.72rem;font-weight:700;padding:6px 12px;cursor:pointer}
  .btn-del{background:transparent;border:1px solid #ff4d4d;border-radius:4px;color:#ff4d4d;font-family:'IBM Plex Mono',monospace;font-size:.72rem;font-weight:700;padding:6px 10px;cursor:pointer}
  .btn-close-modal{width:100%;padding:12px;margin-top:10px;background:transparent;border:1px solid var(--input-border);border-radius:6px;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:.78rem;font-weight:700;cursor:pointer;text-transform:uppercase}
  .no-projects{text-align:center;color:var(--muted);padding:20px;font-size:.82rem}
  button,a,label,select,input{touch-action:manipulation}
  body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:20px 16px}
  header{display:flex;align-items:center;gap:16px;margin-bottom:24px;border-bottom:2px solid var(--accent);padding-bottom:12px}
  header h1{font-family:'IBM Plex Mono',monospace;font-size:1.2rem;font-weight:700;color:var(--accent);letter-spacing:.05em;text-transform:uppercase}
  a.back{font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--muted);text-decoration:none;border:1px solid var(--border);border-radius:3px;padding:4px 10px;margin-left:auto}
  a.back:hover{border-color:var(--accent);color:var(--accent)}

  .wrap{max-width:1000px;margin:0 auto}

  /* Params */
  .params-bar{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:12px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
  .p-label{font-size:.68rem;color:var(--muted);white-space:nowrap}
  input.pi{width:58px;text-align:right;background:var(--input-bg);border:1px solid var(--input-border);border-radius:3px;color:var(--accent);font-family:'IBM Plex Mono',monospace;font-size:.82rem;font-weight:600;padding:3px 7px;outline:none;-moz-appearance:textfield}
  input.pi::-webkit-inner-spin-button{-webkit-appearance:none}
  input.pi:focus{border-color:var(--accent)}

  /* Pièces */
  .piece{background:var(--panel);border:1px solid var(--border);border-radius:6px;margin-bottom:12px;overflow:hidden}
  .piece-hdr{background:var(--hdr);padding:9px 14px;display:flex;align-items:center;justify-content:space-between}
  .piece-hdr h3{font-family:'IBM Plex Mono',monospace;font-size:.78rem;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.05em}
  .piece-hdr .ptot{font-family:'IBM Plex Mono',monospace;font-size:.78rem;font-weight:700;color:var(--accent2)}
  .piece-body table{width:100%;border-collapse:collapse}
  .piece-body th{font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:6px 10px;border-bottom:1px solid var(--border);text-align:right}
  .piece-body th.left{text-align:left}
  .piece-body td{padding:5px 10px;border-bottom:1px solid rgba(170,204,238,.4);font-size:.8rem;vertical-align:middle}
  .piece-body tr:last-child td{border-bottom:none}
  .piece-body tr:hover{background:rgba(240,165,0,.04)}

  input.imin{width:42px;text-align:center;background:#e8f4e8;border:1px solid #aaddaa;border-radius:3px;color:#2a6a2a;font-family:'IBM Plex Mono',monospace;font-size:.75rem;font-weight:600;padding:2px 4px;outline:none;-moz-appearance:textfield}
  input.imin::-webkit-inner-spin-button{-webkit-appearance:none}
  input.ilng{width:48px;text-align:center;background:var(--input-bg);border:1px solid var(--input-border);border-radius:3px;color:var(--accent2);font-family:'IBM Plex Mono',monospace;font-size:.75rem;font-weight:600;padding:2px 4px;outline:none;-moz-appearance:textfield}
  input.ilng::-webkit-inner-spin-button{-webkit-appearance:none}
  input.iqty{width:54px;text-align:right;background:var(--input-bg);border:1px solid var(--input-border);border-radius:3px;color:var(--accent);font-family:'IBM Plex Mono',monospace;font-size:.8rem;font-weight:600;padding:3px 6px;outline:none;-webkit-appearance:auto;appearance:auto}
  input.iqty:focus{border-color:var(--accent)}
  .ntot{text-align:right;font-family:'IBM Plex Mono',monospace;font-size:.78rem;color:var(--accent2);font-weight:700}

  /* Recap */
  .recap{background:var(--panel);border:1px solid var(--border);border-radius:6px;margin-top:20px;overflow:hidden}
  .recap .rh{background:var(--hdr);padding:9px 14px;display:flex;align-items:center;gap:8px}
  .recap .rh span{font-family:'IBM Plex Mono',monospace;font-size:.6rem;font-weight:700;color:var(--bg);background:var(--accent2);padding:2px 7px;border-radius:2px}
  .recap .rh h2{font-size:.75rem;font-weight:500;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
  .rrow{display:flex;justify-content:space-between;align-items:center;padding:9px 16px;border-bottom:1px solid rgba(170,204,238,.4)}
  .rrow:last-child{border-bottom:none}
  .rrow .rl{font-size:.8rem;color:var(--muted)}
  .rrow .rv{font-family:'IBM Plex Mono',monospace;font-size:.88rem;font-weight:700;color:var(--accent2)}
  .rrow.tot{background:rgba(240,165,0,.07);border-top:2px solid var(--accent)}
  .rrow.tot .rl{font-weight:700;color:var(--text);font-size:.85rem;text-transform:uppercase}
  .rrow.tot .rv{color:var(--accent);font-size:1.05rem}

  /* Tarifs */
  #panel_tarifs_c15{border-top:1px solid var(--border)}
  .tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0}
  .tgrp{padding:10px 14px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
  .tgrp-title{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
  .trow{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .trow:last-child{margin-bottom:0}
  .trow label{font-size:.68rem;color:var(--muted);flex:1;white-space:nowrap}
  .trow input{width:58px}
  /* Infos chantier */
  .infos-bar{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:12px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
  /* Version distri : cacher Long et Total par ligne */
  .piece-body th:nth-child(3),
  .piece-body td:nth-child(3),
  .piece-body th:nth-child(5),
  .piece-body td:nth-child(5){ display:none }
  /* Cacher aussi colonne PU fixe dans Divers (col 3) */
  @media print {
    body{ background:white; padding:10px; }
    .infos-bar, .params-bar, .piece-hdr{ background:#e8f0f8 !important; -webkit-print-color-adjust:exact; }
    .rrow.tot{ background:#fff8e8 !important; -webkit-print-color-adjust:exact; }
    button, .btn-bar{ display:none !important; }
    .recap{ page-break-inside:avoid; }
    .piece{ page-break-inside:avoid; margin-bottom:8px; }
  }
</style>
</head>

function calcPU(l, lid){
  var lngEl = document.getElementById(lid+'_L');
  var lng = lngEl ? (parseFloat(lngEl.value)||l.L) : l.L;
  var pf = gt(l.pf);
  var pi = gt(l.pi);
  return (pf*l.nf+pi)*lng;
}

function makePiece(key, label, lignes){
  var div = document.createElement('div');
  div.className = 'piece';

  var hdr = document.createElement('div');
  hdr.className = 'piece-hdr';

  var h3 = document.createElement('h3');
  h3.textContent = label;

  var ptot = document.createElement('span');
  ptot.className = 'ptot';
  ptot.id = 'ptot_'+key;
  ptot.textContent = '0.00 EUR';

  hdr.appendChild(h3);
  hdr.appendChild(ptot);
  div.appendChild(hdr);

  var body = document.createElement('div');
  body.className = 'piece-body';

  var tbl = document.createElement('table');

  // Header
  var thead = document.createElement('thead');
  var htr = document.createElement('tr');
  var cols = ['Designation','Min C15','Long m','Qte','Total'];
  for(var h=0; h<cols.length; h++){
    var th = document.createElement('th');
    th.textContent = cols[h];
    if(h===0) th.className = 'left';
    htr.appendChild(th);
  }
  thead.appendChild(htr);
  tbl.appendChild(thead);

  var tbody = document.createElement('tbody');
  for(var i=0; i<lignes.length; i++){
    var l = lignes[i];
    var lid = key+'_'+l.id;
    var tr = document.createElement('tr');

    var td1 = document.createElement('td'); td1.textContent = l.label;

    var td2 = document.createElement('td'); td2.style.textAlign='center';
    var inMin = document.createElement('input');
    inMin.type='number'; inMin.className='imin'; inMin.id=lid+'_min';
    inMin.value=l.min; inMin.min=0; inMin.step=1;
    inMin.addEventListener('input', recalc);
    td2.appendChild(inMin);

    var td3 = document.createElement('td'); td3.style.textAlign='center';
    var inLng = document.createElement('input');
    inLng.type='number'; inLng.className='ilng'; inLng.id=lid+'_L';
    inLng.value=l.L; inLng.min=1; inLng.step=1;
    inLng.addEventListener('input', recalc);
    td3.appendChild(inLng);

    var td4 = document.createElement('td'); td4.style.textAlign='right';
    var inQty = document.createElement('input');
    inQty.type='number'; inQty.className='iqty'; inQty.id=lid+'_q';
    inQty.value=l.min; inQty.min=0; inQty.step=1;
    inQty.addEventListener('input', recalc);
    td4.appendChild(inQty);

    var td5 = document.createElement('td'); td5.className='ntot'; td5.id=lid+'_tot'; td5.textContent='—';

    tr.appendChild(td1); tr.appendChild(td2); tr.appendChild(td3);
    tr.appendChild(td4); tr.appendChild(td5);
    if(l.hidden) tr.style.display='none';
    tbody.appendChild(tr);
  }
  tbl.appendChild(tbody);
  body.appendChild(tbl);
  div.appendChild(body);
  return div;
}

function collectState(){
  var state={};
  var inputs=document.querySelectorAll('.piece input, .params-bar input, .infos-bar input');
  for(var i=0;i<inputs.length;i++){
    if(inputs[i].id) state[inputs[i].id]=inputs[i].value;
  }
  var sels=document.querySelectorAll('.params-bar select, .infos-bar select, #p_etages');
  for(var i=0;i<sels.length;i++){
    if(sels[i].id) state[sels[i].id]=sels[i].value;
  }
  var commEl=document.getElementById('commentaires');
  if(commEl) state['commentaires']=commEl.value;
  return state;
}

function applyState(state){
  if(state.nb_ch) document.getElementById('nb_ch').value=state.nb_ch;
  if(state.nb_sdb) document.getElementById('nb_sdb').value=state.nb_sdb;
  if(state.nb_wc) document.getElementById('nb_wc').value=state.nb_wc;
  if(state.opt_garage) document.getElementById('opt_garage').value=state.opt_garage;
  if(state.opt_cellier) document.getElementById('opt_cellier').value=state.opt_cellier;
  if(state.opt_bureau) document.getElementById('opt_bureau').value=state.opt_bureau;
  buildAll();
  updateBoitesDistri();
  setTimeout(function(){
    for(var id in state){
      var el=document.getElementById(id);
      if(el && el.tagName==='INPUT') el.value=state[id];
      if(el && el.tagName==='SELECT') el.value=state[id];
    }
    var commEl=document.getElementById('commentaires');
    if(commEl && state.commentaires) commEl.value=state.commentaires;
    recalc();
  }, 200);
}

function sauvegarderC15(){
  var clientEl=document.getElementById('p_client');
  var client=clientEl?(clientEl.value.trim()):'';
  var nom=prompt('Nom de cette etude :', client||'Etude '+new Date().toLocaleDateString('fr-FR'));
  if(!nom) return;
  var state=collectState();
  state._nom=nom;
  state._date=new Date().toLocaleDateString('fr-FR');
  try{
    var raw=localStorage.getItem('c15_distri_etudes')||'{}';
    var etudes=JSON.parse(raw);
    etudes[nom]=state;
    localStorage.setItem('c15_distri_etudes', JSON.stringify(etudes));
    alert('Etude "'+nom+'" sauvegardee.');
  }catch(e){ alert('Erreur de sauvegarde.'); }
}

function ouvrirListeEtudes(){
  try{
    var raw=localStorage.getItem('c15_distri_etudes')||'{}';
    var etudes=JSON.parse(raw);
    var noms=Object.keys(etudes);
    var liste=document.getElementById('liste-etudes');
    if(!liste) return;
    if(noms.length===0){
      liste.innerHTML='<div class="no-projects">Aucune etude sauvegardee.</div>';
    } else {
      liste.innerHTML='';
      for(var i=0;i<noms.length;i++){
        (function(nom){
          var item=document.createElement('div');
          item.className='project-item';
          var info=document.createElement('div'); info.className='project-info';
          var n=document.createElement('div'); n.className='project-name'; n.textContent=nom;
          var d=document.createElement('div'); d.className='project-date'; d.textContent=etudes[nom]._date||'';
          info.appendChild(n); info.appendChild(d);
          var btns=document.createElement('div'); btns.className='project-btns';
          var bl=document.createElement('button'); bl.className='btn-load'; bl.textContent='Charger';
          bl.onclick=function(){ fermerModal(); applyState(etudes[nom]); };
          var bd=document.createElement('button'); bd.className='btn-del'; bd.textContent='X';
          bd.onclick=function(){
            if(!confirm('Supprimer "'+nom+'" ?')) return;
            delete etudes[nom];
            localStorage.setItem('c15_distri_etudes',JSON.stringify(etudes));
            ouvrirListeEtudes();
          };
          btns.appendChild(bl); btns.appendChild(bd);
          item.appendChild(info); item.appendChild(btns);
          liste.appendChild(item);
        })(noms[i]);
      }
    }
    document.getElementById('modal-etudes').classList.add('open');
  }catch(e){ alert('Erreur: '+e.message); }
}

function fermerModal(){
  var m=document.getElementById('modal-etudes');
  if(m) m.classList.remove('open');
}

function envoyerC15(){
  var clientEl=document.getElementById('p_client');
  var client=clientEl?(clientEl.value.trim()):'';
  if(!client){if(clientEl){clientEl.style.borderColor='#ff4d4d';clientEl.focus();}alert('Nom du client obligatoire.');return;}
  var surface=document.getElementById('p_surface')?document.getElementById('p_surface').value:'—';
  var etagesEl=document.getElementById('p_etages');
  var etages=etagesEl?etagesEl.options[etagesEl.selectedIndex].text:'—';
  var date=new Date().toLocaleDateString('fr-FR');
  var matEl=document.getElementById('r_mat'); var mat=matEl?matEl.textContent:'—';
  var totEl=document.getElementById('r_tot'); var tot=totEl?totEl.textContent:'—';
  var margeEl=document.getElementById('r_marge'); var marge=margeEl?margeEl.textContent:'—';

  var lines=[];
  lines.push('C15-100 — CHANTIER : '+client);
  lines.push('Surface : '+surface+' m2 — '+etages);
  lines.push('Date : '+date);
  lines.push('');
  var pieces=document.querySelectorAll('.piece');
  for(var p=0;p<pieces.length;p++){
    var ptot=pieces[p].querySelector('.ptot');
    var h3=pieces[p].querySelector('h3');
    if(!h3) continue;
    lines.push('[ '+h3.textContent+' ] '+( ptot?ptot.textContent:''));
    var rows=pieces[p].querySelectorAll('tbody tr');
    for(var r=0;r<rows.length;r++){
      var td1=rows[r].querySelector('td');
      var inQty=rows[r].querySelector('input.iqty');
      var ntot=rows[r].querySelector('.ntot');
      if(!inQty||!td1) continue;
      var q=parseInt(inQty.value)||0;
      if(q>0) lines.push('  '+td1.textContent+' : '+q+' — '+(ntot?ntot.textContent:''));
    }
  }
  lines.push('');
  lines.push('Matiere brute : '+mat);
  lines.push('PRIX TOTAL    : '+tot);
  lines.push('version : '+marge);
  var commEl=document.getElementById('commentaires');
  var comm=commEl?(commEl.value.trim()):'';
  if(comm){
    lines.push('');
    lines.push('=== COMMENTAIRES / LIGNES SUPPLEMENTAIRES ===');
    lines.push(comm);
  }

  var subject='C15-100 — '+client;
  var body=lines.join('\r\n');
  window.location.href='mailto:laurent.mendez.pro@outlook.fr?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(body);
}

    inMin.value=l.min; inMin.min=0; inMin.step=1;
    inMin.addEventListener('input', recalc);
    td2.appendChild(inMin);

    // PU fixe (affichage + modifiable)
    var td3 = document.createElement('td'); td3.style.textAlign='center';
    var inPU = document.createElement('input');
    inPU.type='number'; inPU.className='ilng'; inPU.id=lid+'_pu';
    inPU.value=l.fixedPU; inPU.min=0; inPU.step=1;
    inPU.addEventListener('input', recalc);
    td3.appendChild(inPU);

    // Qté
    var td4 = document.createElement('td'); td4.style.textAlign='right';
    var inQty = document.createElement('input');
    inQty.type='number'; inQty.className='iqty'; inQty.id=lid+'_q';
    if(l.fixedQty){
      inQty.value=l.fixedQty; inQty.min=l.fixedQty; inQty.max=l.fixedQty; inQty.step=1; inQty.readOnly=true;
      inQty.style.color='var(--muted)'; inQty.style.background='#e8f0f8';
    } else {
      inQty.value=l.min; inQty.min=0; inQty.step=l.id==='prep'||l.id==='ech'?0.5:1;
    }
    inQty.addEventListener('input', recalc);
    td4.appendChild(inQty);

    // Total
    var td5 = document.createElement('td'); td5.className='ntot'; td5.id=lid+'_tot'; td5.textContent='—';

    tr.appendChild(td1); tr.appendChild(td2); tr.appendChild(td3);
    tr.appendChild(td4); tr.appendChild(td5);
    if(l.hidden) tr.style.display='none';
    tbody.appendChild(tr);
  }
  tbl.appendChild(tbody);
  body.appendChild(tbl);
  div.appendChild(body);
  return div;
}

var _matBrut=0, _mo=0, _matf=0;

function imprimerPDF(){
  window.print();
}

function recalcMarge(){
  var matEl  = document.getElementById('r_mat');
  var moEl   = document.getElementById('r_mo');
  var matfEl = document.getElementById('r_matf');
  var trspEl = document.getElementById('r_trsp_input');

  var mat = _matBrut; var mo = _mo; var matf = _matf;
  var trspFact = trspEl ? (parseFloat(trspEl.value)||0) : 0;

  // Prix total = matière facturée + MO + transport facturé
  var newTotal = matf + mo + trspFact;
  var totEl = document.getElementById('r_tot');
  if(totEl) totEl.textContent = newTotal.toFixed(2)+' EUR';

  // Coût réel MO (heure - 17€)
  var heureV = parseFloat(document.getElementById('p_heure').value)||45;
  var tempsH = heureV > 0 ? mo/heureV : 0;
  var coutReelMO = tempsH * (heureV - 17);

  // Coût réel transport (PU dans divers, qté=1)
  var trspPuEl = document.getElementById('divers_trsp_pu');
  var trspCout = trspPuEl ? (parseFloat(trspPuEl.value)||0) : 0;

  // Marge = PV - matière brute - coût réel MO - coût réel transport
  var marge = newTotal - mat - coutReelMO - trspCout;
  var margeP = newTotal > 0 ? (marge/newTotal*100).toFixed(1) : '0';
  var margeEl = document.getElementById('r_marge');
  if(margeEl) margeEl.textContent = marge.toFixed(2)+' EUR ('+margeP+'%)';
  var ttcEl = document.getElementById('r_ttc');
  if(ttcEl) ttcEl.textContent = (newTotal*1.2).toFixed(2)+' EUR';
}

function updateBoitesDistri(){
  var etEl     = document.getElementById('p_etages');
  var surfaceEl= document.getElementById('p_surface');
  var etage    = etEl ? etEl.value : 'plain';
  var surface  = parseFloat(surfaceEl ? surfaceEl.value : 0)||0;

  // Studio : 1 boite fixe
  // Autres : surface totale / 35, arrondi superieur
  var nb = (etage==='studio') ? 1 : (surface > 0 ? Math.ceil(surface / 35) : 1);

  var minEl = document.getElementById('divers_bpav_min');
  var qEl   = document.getElementById('divers_bpav_q');
  if(minEl){ minEl.value = nb; }
  if(qEl){
    qEl.min = nb;
    if((parseFloat(qEl.value)||0) < nb) qEl.value = nb;
  }
  recalc();
}

function buildAll(){
  var cont = document.getElementById('pieces');
  cont.innerHTML = '';

  // Pièces fixes conditionnelles
  var optGarage  = document.getElementById('opt_garage')  ? document.getElementById('opt_garage').value  : 'oui';
  var optCellier = document.getElementById('opt_cellier') ? document.getElementById('opt_cellier').value : 'non';
  var optBureau  = document.getElementById('opt_bureau')  ? document.getElementById('opt_bureau').value  : 'non';

  for(var i=0; i<PIECES.length; i++){
    var key = PIECES[i].key;
    if(key==='garage'  && optGarage==='non')  continue;
    if(key==='cellier' && optCellier==='non') continue;
    if(key==='bureau'  && optBureau==='non')  continue;
    cont.appendChild(makePiece(key, PIECES[i].label, PIECES[i].lignes));
  }

  // WC multiples
  var nbWc = parseInt(document.getElementById('nb_wc') ? document.getElementById('nb_wc').value : 1)||0;
  for(var i=0; i<nbWc; i++){
    cont.appendChild(makePiece('wc'+(i+1), nbWc>1?'WC '+(i+1):'WC', WC_LIGNES));
  }

  var nbCh = parseInt(document.getElementById('nb_ch').value)||0;
  for(var i=0; i<nbCh; i++){
    cont.appendChild(makePiece('ch'+(i+1), 'Chambre '+(i+1), CHAMBRE));
  }

  var nbSdb = parseInt(document.getElementById('nb_sdb').value)||0;
  for(var i=0; i<nbSdb; i++){
    cont.appendChild(makePiece('sdb'+(i+1), 'Salle de bain '+(i+1), SDB));
  }

  cont.appendChild(makePieceLignesDirectes());
  cont.appendChild(makePieceDivers());
  recalc();
}

function recalc(){
  var totPts=0, totMat=0, totTemps=0, totTransport=0;
  var pieces = document.querySelectorAll('.piece');

  for(var p=0; p<pieces.length; p++){
    var key = pieces[p].querySelector('.ptot').id.replace('ptot_','');
    var rows = pieces[p].querySelectorAll('tbody tr');
    var blockTot = 0;

    for(var r=0; r<rows.length; r++){
      var inMin  = rows[r].querySelector('input.imin');
      var inLng  = rows[r].querySelector('input.ilng');
      var inQty  = rows[r].querySelector('input.iqty');
      var totEl  = rows[r].querySelector('.ntot');
      if(!inQty) continue;

      var mn  = inMin  ? (parseInt(inMin.value)||0) : 0;
      var lng = inLng  ? (parseFloat(inLng.value)||15) : 15;
      var q   = parseInt(inQty.value)||0;

      // Forcer qte >= min
      if(q < mn){ inQty.value = mn; q = mn; }

      // Trouver les tarifs via l'id de l'input min
      var lid = inMin ? inMin.id.replace('_min','') : '';
      var lineData = findLine(lid);
      var pu = 0;
      if(lineData){
        var pf = gt(lineData.pf);
        var pi = gt(lineData.pi);
        pu = (pf*lineData.nf+pi)*lng;
      }
      var tot = pu*q;
      if(totEl) totEl.textContent = (isNaN(tot)?0:tot).toFixed(2)+' EUR';
      blockTot += isNaN(tot)?0:tot;
      totPts += q;
      totMat += isNaN(tot)?0:tot;
      totTemps += q*5;
    }

    var ptotEl = document.getElementById('ptot_'+key);
    if(ptotEl) ptotEl.textContent = blockTot.toFixed(2)+' EUR';
  }

  // Lignes directes
  var ldTot = 0;
  for(var d=0; d<LIGNES_DIRECTES.length; d++){
    var l = LIGNES_DIRECTES[d];
    var lid = 'ld_'+l.id;
    var inMin  = document.getElementById(lid+'_min');
    var inLng  = document.getElementById(lid+'_L');
    var inQty  = document.getElementById(lid+'_q');
    var totEl  = document.getElementById(lid+'_tot');
    if(!inQty) continue;
    var mn  = inMin  ? (parseInt(inMin.value)||0)   : 0;
    var lng = inLng  ? (parseFloat(inLng.value)||l.L): l.L;
    var q   = parseInt(inQty.value)||0;
    if(q < mn){ inQty.value=mn; q=mn; }
    var pf = gt(l.pf); var pi = gt(l.pi);
    var pu = (pf*l.nf+pi)*lng;
    var tot = pu*q;
    if(totEl) totEl.textContent = tot.toFixed(2)+' EUR';
    ldTot  += tot;
    totMat += tot;
    totPts += q;
    totTemps += q*5;
  }
  var ptLd = document.getElementById('ptot_ld');
  if(ptLd) ptLd.textContent = ldTot.toFixed(2)+' EUR';

  // Divers
  var diversTot = 0;
  for(var d=0; d<DIVERS.length; d++){
    var lid = 'divers_'+DIVERS[d].id;
    var inPU  = document.getElementById(lid+'_pu');
    var inQty = document.getElementById(lid+'_q');
    var inMin = document.getElementById(lid+'_min');
    var totEl = document.getElementById(lid+'_tot');
    if(!inQty) continue;
    var mn  = inMin ? (parseInt(inMin.value)||0) : 0;
    var pu  = inPU  ? (parseFloat(inPU.value)||0) : 0;
    var q   = parseFloat(inQty.value)||0;
    if(q < mn){ inQty.value = mn; q = mn; }
    var tot = pu*q;
    if(totEl) totEl.textContent = tot.toFixed(2)+' EUR';
    diversTot += tot;
    if(DIVERS[d].freeTotal){ totTransport += tot; }
    else { totMat += tot; }
    totPts += Math.ceil(q);
  }
  var ptDivers = document.getElementById('ptot_divers');
  if(ptDivers) ptDivers.textContent = diversTot.toFixed(2)+' EUR';

  var coefV = coef();
  var heureV = heure();
  var matFact = totMat * coefV;
  var moFact = (totTemps/60) * heureV;
  var total = matFact + moFact + totTransport;
  // Marge : PV - matière brute - coût réel MO (heure-17) - transport
  var coutReelMO = (totTemps/60) * (heureV - 17);
  var marge = total - totMat - coutReelMO - totTransport;
  var margeP = total > 0 ? (marge/total*100).toFixed(1) : '0';

  function sv(id,v){var e=document.getElementById(id);if(e)e.textContent=v;}
  sv('r_pts',   totPts+' points');
  sv('r_mat',   totMat.toFixed(2)+' EUR');
  sv('r_matf',  matFact.toFixed(2)+' EUR (x'+coefV.toFixed(2)+')');
  sv('r_mo',    moFact.toFixed(2)+' EUR');
  // Transport
  var trspInput=document.getElementById('r_trsp_input');
  if(trspInput){ trspInput.value=totTransport.toFixed(2); }
  var trspDisp=document.getElementById('r_trsp_display');
  if(trspDisp) trspDisp.textContent=totTransport.toFixed(2)+' EUR';
  sv('r_marge', marge.toFixed(2)+' EUR ('+margeP+'%)');
  sv('r_tot',   total.toFixed(2)+' EUR');
  // TTC
  var ttcEl=document.getElementById('r_ttc');
  if(ttcEl) ttcEl.textContent=(total*1.2).toFixed(2)+' EUR';
}

function findLine(lid){
  var all = [];
  for(var i=0;i<PIECES.length;i++) all = all.concat(PIECES[i].lignes);
  all = all.concat(CHAMBRE).concat(SDB).concat(LIGNES_DIRECTES);
  for(var i=0;i<all.length;i++){
    var suffix = '_'+all[i].id;
    if(lid.length>suffix.length && lid.slice(-suffix.length)===suffix) return all[i];
  }
  return null;
}

buildAll();
updateBoitesDistri();
</script>
